<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>香蕉车水果大收集 - 详细注释版</title>
    <!-- 引入 Tailwind CSS 用于快速构建 UI 样式 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden; /* 防止页面滚动 */
            background-color: #fdfdfd;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            touch-action: none; /* 禁用系统默认手势，确保触控流畅 */
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #fdfdfd;
        }
        canvas {
            display: block; /* 移除 Canvas 底部间隙 */
        }
        /* UI 顶层布局：分数与生命值 */
        .ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none; /* UI 层不拦截点击事件 */
            user-select: none;
            z-index: 50;
        }
        .info-box {
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 25px;
            border: 4px solid #FFD700;
            font-size: clamp(16px, 4vw, 24px);
            font-weight: bold;
            color: #5d5d5d;
            box-shadow: 0 6px 12px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        /* 游戏屏幕通用样式（开始与结束） */
        #start-screen, #end-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.9);
            z-index: 100;
            text-align: center;
            padding: 20px;
        }
        /* 亮黄色大按钮样式 */
        .btn {
            background: linear-gradient(180deg, #FFEB3B 0%, #FBC02D 100%);
            color: #5D4037;
            padding: 15px 40px;
            font-size: clamp(20px, 5vw, 30px);
            border-radius: 60px;
            border: none;
            cursor: pointer;
            box-shadow: 0 8px 0 #AF8F00;
            transition: all 0.1s;
            margin-top: 20px;
            pointer-events: auto; /* 允许点击 */
            font-weight: bold;
        }
        .btn:active {
            transform: translateY(4px); /* 按下时的位移 */
            box-shadow: 0 4px 0 #AF8F00;
        }
        .title {
            font-size: clamp(32px, 8vw, 56px);
            color: #FFB300;
            margin-bottom: 20px;
            text-shadow: 2px 2px 0px #FFF;
            font-weight: 900;
        }
        /* 撞击时的屏幕抖动动画 */
        .hit-effect {
            animation: shake 0.4s both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- 游戏进行中的 UI 信息 -->
    <div class="ui-layer" id="ui-layer" style="display: none;">
        <div class="info-box">🎒 <span id="score">0</span></div>
        <div class="info-box">生命: <span id="lives-container">❤️❤️❤️</span></div>
    </div>

    <!-- 开始界面 -->
    <div id="start-screen">
        <h1 class="title">🍌 香蕉车大冒险 🍌</h1>
        <p class="text-xl text-gray-500 mb-6">接满 10 个水果，看最清晰的烟花！🌟</p>
        <button class="btn" id="start-btn">开始游戏</button>
    </div>

    <!-- 结束界面 -->
    <div id="end-screen" style="display: none;">
        <h1 class="title" id="end-title">大丰收！</h1>
        <p class="text-2xl text-gray-600 mb-6">你一共运送了 <span id="final-score" class="font-bold text-orange-500">0</span> 个水果！</p>
        <button class="btn" id="restart-btn">再玩一次</button>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script>
    // --- 核心画布设置 ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const livesContainer = document.getElementById('lives-container');
    const finalScoreEl = document.getElementById('final-score');
    const startScreen = document.getElementById('start-screen');
    const endScreen = document.getElementById('end-screen');
    const uiLayer = document.getElementById('ui-layer');
    const gameContainer = document.getElementById('game-container');

    // 物品库
    const FRUITS = ['🍎', '🍌', '🍒', '🍇', '🍉', '🍓', '🍍', '🍑', '🥝', '🍐', '🍊', '🍋'];
    const DANGERS = ['💣', '⚾', '🧦', '🧱', '💩', '🌵', '👞', '🥊'];
    const FIREWORK_EMOJIS = ['⭐', '🌸', '🌼', '🌻', '✨', '🎈'];

    // --- 游戏状态变量 ---
    let score = 0;           // 当前得分
    let lives = 3;           // 剩余生命
    let gameActive = false;  // 游戏是否在进行中
    let carX = 0;            // 车的水平坐标
    let carY = 0;            // 车的垂直坐标（固定在草地上）
    let prevCarX = 0;        // 记录上一帧的车坐标，用于计算速度/惯性
    let sway = 0;            // 水果堆的物理摆动幅度
    let wheelAngle = 0;      // 轮子的滚动角度
    let items = [];          // 掉落中的物品数组
    let stackedFruits = [];  // 已收集且堆叠在车里的水果
    let clouds = [];         // 背景云朵
    let fireworkParticles = []; // 烟花粒子数组
    let lastItemTime = 0;    // 上一次产生物品的时间
    let grassDots = [];      // 静态草地笔触细节

    // --- 音效系统 (Web Audio API 实时合成) ---
    let audioCtx = null;
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    // 合成不同类型的音效
    function playSound(type) {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;

        if (type === 'pop') { // 收集水果音效：清脆的上扬音
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sine'; 
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            osc.start(now); osc.stop(now + 0.2);
        } else if (type === 'hit') { // 撞击音效：低沉的方波碰撞音
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'square'; 
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.exponentialRampToValueAtTime(40, now + 0.1);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.linearRampToValueAtTime(0.01, now + 0.3);
            osc.start(now); osc.stop(now + 0.3);
        } else if (type === 'start') { // 开始音效：欢快的小调和弦
            [440, 554, 659, 880].forEach((f, i) => {
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                o.frequency.setValueAtTime(f, now + i * 0.1);
                g.gain.setValueAtTime(0.1, now + i * 0.1);
                g.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.1);
                o.start(now + i * 0.1); o.stop(now + i * 0.1 + 0.1);
            });
        } else if (type === 'firework') { // 烟花音效：快速闪烁的晶莹音
            for(let i=0; i<12; i++) {
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                const startTime = now + i * 0.05;
                o.type = 'sine';
                o.frequency.setValueAtTime(1000 + i * 100, startTime);
                o.frequency.exponentialRampToValueAtTime(2500, startTime + 0.08);
                g.gain.setValueAtTime(0.08, startTime);
                g.gain.exponentialRampToValueAtTime(0.01, startTime + 0.08);
                o.start(startTime); o.stop(startTime + 0.08);
            }
        } else if (type === 'over') { // 结束音效：缓慢下沉的悲伤音
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'triangle'; 
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.linearRampToValueAtTime(100, now + 0.5);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.linearRampToValueAtTime(0.01, now + 0.5);
            osc.start(now); osc.stop(now + 0.5);
        }
    }

    // 屏幕尺寸自适应逻辑
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        carY = canvas.height - 180; // 锁定香蕉车高度
        if (!gameActive) carX = canvas.width / 2;
        generateGrassDetails(); 
    }

    // 生成背景草地的点状细节
    function generateGrassDetails() {
        grassDots = [];
        const count = Math.floor(canvas.width / 20);
        for (let i = 0; i < count; i++) {
            grassDots.push({
                relX: Math.random() - 0.5,
                relY: Math.random() * 0.6,
                length: 4 + Math.random() * 6,
                angle: (Math.random() - 0.5) * 0.4
            });
        }
    }

    // 指针控制（鼠标/触控）
    function handlePointerMove(e) {
        if (!gameActive) return;
        if (e.touches) carX = e.touches[0].clientX;
        else carX = e.clientX;
        keepInBounds();
    }

    // 键盘控制（方向键）
    function handleKeyDown(e) {
        if (!gameActive) return;
        const speed = 40;
        if (e.key === 'ArrowLeft') carX -= speed;
        if (e.key === 'ArrowRight') carX += speed;
        keepInBounds();
    }

    // 限制车的水平范围，防止跑出屏幕
    function keepInBounds() {
        if (carX < 50) carX = 50;
        if (carX > canvas.width - 50) carX = canvas.width - 50;
    }

    window.addEventListener('resize', resize);
    window.addEventListener('mousemove', handlePointerMove);
    window.addEventListener('touchstart', handlePointerMove);
    window.addEventListener('touchmove', handlePointerMove);
    window.addEventListener('keydown', handleKeyDown);

    // --- 实体类定义 ---

    // 烟花粒子类
    class Particle {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 6 + 3;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed - 2; // 带有向上的初始力
            this.emoji = FIREWORK_EMOJIS[Math.floor(Math.random() * FIREWORK_EMOJIS.length)];
            this.life = 1.0; 
            this.holdFrames = 60; // 在前 60 帧内保持 100% 透明度
            this.decay = 0.015 + Math.random() * 0.01; // 之后逐渐衰减
            this.rotation = Math.random() * Math.PI * 2;
            this.rotVel = (Math.random() - 0.5) * 0.3;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.vy += 0.15; // 重力感
            if (this.holdFrames > 0) {
                this.holdFrames--;
            } else {
                this.life -= this.decay;
            }
            this.rotation += this.rotVel;
        }
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rotation);
            ctx.globalAlpha = Math.max(0, this.life); // 基于寿命设置透明度
            const displaySize = 40 + (Math.max(0, this.life) * 10);
            ctx.font = `${displaySize}px serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(this.emoji, 0, 0);
            ctx.restore();
        }
    }

    // 下落物品类
    class Item {
        constructor() {
            this.x = Math.random() * (canvas.width - 100) + 50;
            this.y = -60;
            this.speed = Math.random() * 2 + 3 + (score * 0.03); // 速度随分数提升
            this.size = 50;
            this.isFruit = Math.random() > 0.35; // 65% 的概率是水果
            this.emoji = this.isFruit ? 
                FRUITS[Math.floor(Math.random() * FRUITS.length)] : 
                DANGERS[Math.floor(Math.random() * DANGERS.length)];
            this.rotation = (Math.random() - 0.5) * 0.1;
            this.currentRotation = 0;
        }
        update() {
            this.y += this.speed;
            this.currentRotation += this.rotation;
        }
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.currentRotation);
            ctx.font = `${this.size}px serif`;
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(this.emoji, 0, 0);
            ctx.restore();
        }
    }

    // 背景云朵类
    class Cloud {
        constructor() { this.reset(); this.x = Math.random() * canvas.width; }
        reset() {
            this.x = -200;
            this.y = 40 + Math.random() * 150;
            this.w = 120 + Math.random() * 100; this.h = this.w * 0.45;
            this.speed = 0.3 + Math.random() * 0.5;
        }
        update() { this.x += this.speed; if (this.x > canvas.width + 200) this.reset(); }
        draw() {
            ctx.fillStyle = '#B3E5FC'; ctx.beginPath();
            ctx.ellipse(this.x, this.y, this.w/2, this.h/2, 0, 0, Math.PI * 2);
            ctx.fill(); ctx.strokeStyle = '#81D4FA'; ctx.lineWidth = 2; ctx.stroke();
        }
    }

    // 绘制车上堆叠的水果堆
    function drawStackedFruits(x, y, scale) {
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(scale, scale);
        stackedFruits.forEach((f) => {
            ctx.save();
            // 物理摇晃：高处的水果受到更强的惯性摆幅影响
            const heightFactor = Math.abs(f.relY) / 100;
            const currentSway = sway * (1 + heightFactor * 1.5);
            ctx.translate(f.relX + currentSway, f.relY);
            ctx.rotate(currentSway * 0.02);
            ctx.font = `45px serif`;
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(f.emoji, 0, 0);
            ctx.restore();
        });
        ctx.restore();
    }

    // 绘制香蕉车的主体和细节
    function drawBananaCarBody(x, y, rotation) {
        const w = 380; const h = 180; 
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(0.65, 0.65); 

        // 1. 香蕉外壳轮廓
        ctx.beginPath();
        ctx.moveTo(-w/2, -35); 
        ctx.bezierCurveTo(-w/3, 130, w/3, 140, w/2, -70); 
        ctx.quadraticCurveTo(w/2 + 50, -120, w/2 - 15, -140); 
        ctx.bezierCurveTo(w/4, 40, -w/4, 30, -w/2, -35); 
        
        // 渐变上色
        const grad = ctx.createLinearGradient(0, -40, 0, 100);
        grad.addColorStop(0, '#FFF59D'); grad.addColorStop(0.3, '#FFEE58'); grad.addColorStop(1, '#FBC02D');
        ctx.fillStyle = grad; ctx.fill(); ctx.strokeStyle = '#F9A825'; ctx.lineWidth = 6; ctx.stroke();

        // 2. 两端棕色尖角
        ctx.fillStyle = '#5D4037';
        ctx.save(); ctx.translate(-w/2, -35); ctx.rotate(-0.5); ctx.fillRect(-8, -8, 16, 16); ctx.restore();
        ctx.save(); ctx.translate(w/2 - 15, -140); ctx.rotate(0.5); ctx.fillRect(-8, -8, 16, 16); ctx.restore();

        // 3. 香蕉斑纹
        ctx.strokeStyle = 'rgba(93, 64, 55, 0.2)'; ctx.lineWidth = 4;
        [[-80, 40], [-20, 70], [50, 60], [100, 30]].forEach(p => {
            ctx.beginPath(); ctx.moveTo(p[0], p[1]); ctx.lineTo(p[0]+20, p[1]); ctx.stroke();
        });

        // 4. 可爱表情绘制
        const faceOffsetX = 125; const faceOffsetY = -15;
        ctx.strokeStyle = '#3E2723'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(faceOffsetX-18, faceOffsetY, 16, 0, Math.PI*2); ctx.stroke(); // 左眼镜
        ctx.beginPath(); ctx.arc(faceOffsetX+18, faceOffsetY, 16, 0, Math.PI*2); ctx.stroke(); // 右眼镜
        ctx.beginPath(); ctx.moveTo(faceOffsetX-2, faceOffsetY); ctx.lineTo(faceOffsetX+2, faceOffsetY); ctx.stroke(); // 中梁
        ctx.fillStyle = '#3E2723';
        ctx.beginPath(); ctx.arc(faceOffsetX-18, faceOffsetY, 3.5, 0, Math.PI*2); ctx.fill(); // 左眼珠
        ctx.beginPath(); ctx.arc(faceOffsetX+18, faceOffsetY, 3.5, 0, Math.PI*2); ctx.fill(); // 右眼珠
        ctx.beginPath(); ctx.arc(faceOffsetX, faceOffsetY+20, 15, 0.4, Math.PI-0.4); ctx.stroke(); // 笑容

        // 5. 滚动轮子绘制
        const drawWheel = (wx) => {
            ctx.save(); ctx.translate(wx, 115);
            ctx.fillStyle = '#1B1B1B'; ctx.beginPath(); ctx.arc(0, 0, 40, 0, Math.PI*2); ctx.fill(); // 轮胎
            ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI*2); ctx.fill(); // 轮轴
            ctx.rotate(rotation); // 转动逻辑
            ctx.strokeStyle = '#1B1B1B'; ctx.lineWidth = 2;
            for(let i=0; i<8; i++) { // 轮毂辐条
                ctx.beginPath(); ctx.moveTo(0, 0); 
                ctx.lineTo(Math.cos(i*Math.PI/4)*18, Math.sin(i*Math.PI/4)*18); ctx.stroke();
            }
            ctx.restore();
        };
        drawWheel(-75); drawWheel(75);
        ctx.restore();
    }

    // 触发烟花庆典
    function createFirework() {
        playSound('firework');
        const fireX = Math.random() * (canvas.width * 0.6) + (canvas.width * 0.2);
        const fireY = canvas.height * 0.2; 
        for(let i=0; i<10; i++) {
            fireworkParticles.push(new Particle(fireX, fireY));
        }
    }

    // 初始化/开始游戏
    function startGame() {
        initAudio(); playSound('start');
        score = 0; lives = 3; items = []; stackedFruits = []; fireworkParticles = [];
        scoreEl.innerText = score; updateLivesDisplay();
        gameActive = true; 
        startScreen.style.display = 'none'; 
        endScreen.style.display = 'none';
        uiLayer.style.display = 'flex';
        carX = canvas.width / 2; prevCarX = carX;
    }

    // 更新心形生命值显示
    function updateLivesDisplay() {
        livesContainer.innerText = "❤️".repeat(lives) + "🖤".repeat(3 - lives);
    }

    // --- 主游戏循环 ---
    function mainLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        wheelAngle += 0.15; // 轮子角速度计算
        
        // 物理惯性计算：基于车位移计算 sway，模仿物体在车厢内的晃动
        const carVel = carX - prevCarX;
        sway = sway * 0.82 + carVel * 0.45; 
        prevCarX = carX;

        // 1. 绘制底层背景层：云朵
        clouds.forEach(c => { c.update(); c.draw(); });

        // 2. 绘制草地层
        const grassH = 300; const grassY = canvas.height + 150; const grassW = canvas.width * 1.5;
        ctx.fillStyle = '#A3D977'; ctx.beginPath(); ctx.ellipse(canvas.width/2, grassY, grassW, grassH, 0, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#76A64B'; ctx.lineWidth = 3; ctx.lineCap = 'round';
        grassDots.forEach(dot => {
            const gx = canvas.width/2 + dot.relX * grassW;
            const gy = grassY - dot.relY * grassH;
            if (gy > canvas.height - 110) {
                ctx.beginPath(); ctx.moveTo(gx, gy); ctx.lineTo(gx + dot.angle*10, gy - dot.length); ctx.stroke();
            }
        });

        if (gameActive) {
            // 产生新物品
            let now = Date.now();
            if (now - lastItemTime > Math.max(400, 1000 - score * 10)) {
                items.push(new Item()); lastItemTime = now;
            }

            // 3. 绘制已堆叠的水果（位于车壳之下）
            drawStackedFruits(carX, carY, 0.65);

            // 4. 掉落物品逻辑与碰撞检测
            for (let i = items.length - 1; i >= 0; i--) {
                items[i].update(); items[i].draw();
                const dist = Math.sqrt(Math.pow(items[i].x - carX, 2) + Math.pow(items[i].y - carY, 2));
                
                if (dist < 112) { // 发生碰撞
                    if (items[i].isFruit) {
                        score++; scoreEl.innerText = score; playSound('pop');
                        if (score > 0 && score % 10 === 0) createFirework(); // 每10个发烟花

                        // --- 3层递减1的厚实堆叠算法 ---
                        const fIndex = stackedFruits.length;
                        let row = 0; let totalSlotsBefore = 0; const baseSize = 8; 
                        while (true) {
                            let currentRowWidth = Math.max(1, baseSize - Math.floor(row / 3));
                            if (totalSlotsBefore + currentRowWidth > fIndex) break;
                            totalSlotsBefore += currentRowWidth; row++;
                        }
                        let posInRow = fIndex - totalSlotsBefore;
                        let currentRowWidth = Math.max(1, baseSize - Math.floor(row / 3));
                        const spacingX = 30; const spacingY = 22;
                        const relX = (posInRow - (currentRowWidth - 1) / 2) * spacingX;
                        const relY = 35 - (row * spacingY);
                        
                        stackedFruits.push({ emoji: items[i].emoji, relX: relX + (Math.random() - 0.5) * 4, relY: relY });
                    } else { // 撞到危险品
                        lives--; updateLivesDisplay(); playSound('hit');
                        gameContainer.classList.add('hit-effect');
                        setTimeout(() => gameContainer.classList.remove('hit-effect'), 400);
                        if (lives <= 0) { // 游戏结束
                            gameActive = false; playSound('over');
                            finalScoreEl.innerText = score; endScreen.style.display = 'flex'; uiLayer.style.display = 'none';
                        }
                    }
                    items.splice(i, 1);
                } else if (items[i].y > canvas.height + 100) items.splice(i, 1);
            }

            // 5. 绘制香蕉车壳层
            ctx.fillStyle = 'rgba(0,0,0,0.05)';
            ctx.beginPath(); ctx.ellipse(carX, canvas.height - 70, 180, 30, 0, 0, Math.PI * 2); ctx.fill(); // 地面阴影
            drawBananaCarBody(carX, carY, wheelAngle);

            // 6. 绘制最顶层：空中烟花（始终保持最前方）
            for(let i=fireworkParticles.length-1; i>=0; i--) {
                fireworkParticles[i].update();
                fireworkParticles[i].draw();
                if(fireworkParticles[i].life <= 0) fireworkParticles.splice(i, 1);
            }

        } else {
            // 静态预览模式
            drawBananaCarBody(canvas.width/2, canvas.height - 180, wheelAngle * 0.5);
            for(let i=fireworkParticles.length-1; i>=0; i--) {
                fireworkParticles[i].update(); fireworkParticles[i].draw();
                if(fireworkParticles[i].life <= 0) fireworkParticles.splice(i, 1);
            }
        }
        requestAnimationFrame(mainLoop);
    }

    // 页面加载后的启动脚本
    window.onload = () => {
        resize(); 
        for(let i=0; i<5; i++) clouds.push(new Cloud()); // 初始化云朵
        document.getElementById('start-btn').onclick = startGame;
        document.getElementById('restart-btn').onclick = startGame;
        requestAnimationFrame(mainLoop);
    };
</script>
</body>
</html>
